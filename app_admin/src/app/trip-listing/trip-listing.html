<div>
    <button (click)="addTrip()" class="btn btn-info mb-3">Add Trip</button>
</div>
<p *ngIf="message" class="mb-3">{{ message }}</p>
<div class="row g-3">
    <div *ngFor="let trip of trips" class="col-12 col-md-6 col-lg-4">
    <app-trip-card [trip]="trip" class="card-deck mt-2"></app-trip-card>
 </div>
</div>
